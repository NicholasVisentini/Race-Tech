<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/RaceTechIcon1.svg" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceTech | Dashboards</title>

    
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!--FONT AWESOME-->

</head>

<body onload="validarSessao(), carregardashboard()">
    <div class="janela">
        <div class="header-left">
            <h1>RaceTech</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <!-- <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>Aquários e Terrários</h3>
                </a>
            </div> -->

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Mural de Avisos</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./quiz.html">
                    <h3>quiz</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">
            <div id="alerta">
            </div>
 
            <div class="cards">
                <div class="card-aquario">
                    <div class="title-aquario">
                        <h1>Acerto geral</h1>
                    </div>
                    <div class="desc-aquario">
                        <div class="temperatura">
                            <p><span id="acertototal"></span>%</p>
                        </div>
                    </div>
                </div>
 
                <div class="card-aquario">
                    <div class="title-aquario">
                        <h1>Quiz jogados</h1>
                    </div>
                    <div class="desc-aquario">
                        <div class="temperatura">
                            <p id="totalquiz"></p>
                        </div>
                    </div>
                </div>
 
                <div class="card-aquario">
                    <div class="title-aquario">
                        <h1>Melhor pontuação</h1>
                    </div>
                    <div class="desc-aquario">
                        <div class="temperatura">
                            <p id="melhorpontuacao"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="graficos">
                <h3 class="tituloGraficos">Taxa de acerto por pergunta</h3>
                <div class="graph">
                    <canvas id="linha"></canvas>
                </div>

                <h3 class="tituloGraficos">Top 3 perguntas mais erradas</h3>
                <div class="graph">
                    <canvas id="barra"></canvas>
                </div>
            </div>
        </div>
    </div>


</body>

</html>

<script>
    function carregardashboard() {
        let idusuario = sessionStorage.ID_USUARIO;

        fetch(`/dashboard/acerto-total/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    acertototal.innerHTML = resposta[0].acerto_total == null ? 0 : resposta[0].acerto_total;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        }).catch(function (erro) {
            console.error(`Erro na obtenção do acerto geral: ${erro.message}`);
        });

        fetch(`/dashboard/total-quiz/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    totalquiz.innerHTML = resposta[0].total_quiz;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        }).catch(function (erro) {
            console.error(`Erro na obtenção do total de quiz: ${erro.message}`);
        });

        fetch(`/dashboard/melhor-pontuacao/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    melhorpontuacao.innerHTML = resposta[0].melhor_pontuacao == null ? 0 : resposta[0].melhor_pontuacao;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        }).catch(function (erro) {
            console.error(`Erro na obtenção da melhor pontuação: ${erro.message}`);
        });

        fetch(`/dashboard/acerto-por-pergunta/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    plotargraficolinha(resposta);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        }).catch(function (erro) {
            console.error(`Erro na obtenção dos dados p/ gráfico de linha: ${erro.message}`);
        });

        fetch(`/dashboard/mais-erradas/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    plotargraficobarra(resposta);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        }).catch(function (erro) {
            console.error(`Erro na obtenção dos dados p/ gráfico de barra: ${erro.message}`);
        });
    }

    function plotargraficolinha(resposta) {
        let perguntas = [];
        let taxas = [];
 
        for (let i = 0; i < resposta.length; i++) {
            perguntas.push("Pergunta " + resposta[i].numero_pergunta);
            taxas.push(resposta[i].taxa_acerto);
        }

        new Chart(linha, {
            type: 'line',
            data: {
                labels: perguntas,
                datasets: [{
                    label: 'Taxa de acerto (%)',
                    data: taxas,
                    backgroundColor: 'rgba(199, 52, 52, 0.2)',
                    borderColor: 'rgba(199, 52, 52, 1)',
                    borderWidth: 1
                }]
            }
        });
    }


    function plotargraficobarra(resposta) {
        let perguntas = [];
        let taxas = [];
 
        for (let i = 0; i < resposta.length; i++) {
            perguntas.push("Pergunta " + resposta[i].numero_pergunta);
            taxas.push(resposta[i].taxa_erro);
        }

        new Chart(barra, {
            type: 'bar',
            data: {
                labels: perguntas,
                datasets: [{
                    label: 'Taxa de erro (%)',
                    data: taxas,
                    backgroundColor: 'rgba(199, 52, 52, 0.2)',
                    borderColor: 'rgba(199, 52, 52, 1)',
                    borderWidth: 1
                }]
            }
        });
    }
</script>
